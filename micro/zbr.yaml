filetype: zbr

detect:
    filename: "\\.zbr$"

rules:
    - comment:
        start: "//"
        end: "$"

    - statement: "^#(name|trigger|description|type|scope|option)\\b"
    - identifier: "onInteraction(?={)"
    - identifier: "on[a-zA-Z_][a-zA-Z0-9_]*"
    - preprocessor: "\\bZ[a-zA-Z_][a-zA-Z0-9_]*(?={)"
    - symbol: "(==|!=|>=|<=|>|<|&&|\\|\\|)"
    - special: "\\\\[{};\\\\]"
    - symbol: "[{};]"
